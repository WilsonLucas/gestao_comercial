<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestao Comercial</title>
  <script>
    (function redirect() {
      const token = localStorage.getItem('sgc_token');
      const usuario = localStorage.getItem('sgc_usuario');
      window.location.replace(token && usuario ? 'dashboard.html' : 'login.html');
    }());
  </script>
</head>
<body></body>
</html>
