<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras | Sistema de Gestao Comercial</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="lista-compras">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <section class="page-heading">
          <div>
            <span class="eyebrow">Reposicao</span>
            <h1>Lista de Compras</h1>
            <p>Ingredientes com estoque critico ou em atencao que precisam ser repostos.</p>
          </div>
        </section>

        <section class="panel">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Ingrediente</th>
                  <th>Unidade</th>
                  <th>Estoque atual</th>
                  <th>Estoque minimo</th>
                  <th>Preco estimado</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="lista-compras-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/lista-compras.js"></script>
</body>
</html>
