<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDV | Sistema de Gestao Comercial</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="pdv">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <section class="page-heading">
          <div>
            <span class="eyebrow">Caixa</span>
            <h1>PDV - Ponto de Venda</h1>
            <p>Adicione produtos ao carrinho e finalize a venda.</p>
          </div>
        </section>

        <section class="panel-grid two-columns align-start">
          <article class="panel">
            <div class="panel-header">
              <div>
                <h2>Adicionar produto</h2>
                <p>Selecione o produto e a quantidade.</p>
              </div>
            </div>
            <div class="form-grid">
              <label><span>Produto</span>
                <select id="pdv-produto">
                  <option value="">Selecione um produto</option>
                </select>
              </label>
              <label><span>Quantidade</span>
                <input type="number" id="pdv-quantidade" value="1" min="1" step="1">
              </label>
              <div class="form-actions full-width">
                <button class="btn btn-primary" id="pdv-adicionar" type="button">Adicionar ao carrinho</button>
              </div>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <div>
                <h2>Carrinho</h2>
                <p>Itens adicionados para esta venda.</p>
              </div>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Produto</th>
                    <th>Qtd.</th>
                    <th>Preco unit.</th>
                    <th>Acao</th>
                  </tr>
                </thead>
                <tbody id="carrinho-body"></tbody>
              </table>
            </div>
            <div style="margin-top:16px; display:flex; justify-content:space-between; align-items:center;">
              <strong>Total: <span id="carrinho-total">R$ 0,00</span></strong>
              <div class="actions">
                <button class="btn btn-secondary" id="pdv-limpar" type="button">Limpar</button>
                <button class="btn btn-primary" id="pdv-finalizar" type="button">Finalizar venda</button>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/pdv.js"></script>
</body>
</html>
