<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Cardápio | Pastelaria Bom Sabor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">

  <link rel="stylesheet" href="assets/css/cardapio.css?v=2.0">
</head>
<!--
  Painel Cardápio — v2.0 (TV-first)
  Página PÚBLICA, read-only, sem autenticação (data-page="cardapio").
  Projetada para TV 1080p landscape pendurada sobre o caixa.
  - Zero scroll: conteúdo dividido em vistas rotativas
  - Rotação automática 20s com crossfade 800ms
  - Apenas supabase-client.js + cardapio.js (sem auth/app/config)
-->
<body data-page="cardapio" class="cardapio-body">

  <header class="cardapio-header">
    <div class="cardapio-header-inner">
      <div class="cardapio-titulo">
        <span class="cardapio-eyebrow">Cardápio</span>
        <h1>Pastelaria Bom Sabor</h1>
      </div>
      <div class="cardapio-status" id="cardapio-status" data-status="ok" title="Atualização automática">
        <span class="cardapio-status-dot"></span>
        <span class="cardapio-status-label">Atualizando...</span>
      </div>
    </div>
  </header>

  <main class="cardapio-shell">
    <div class="cardapio-palco" id="cardapio-palco">
      <p class="cardapio-loading">Carregando cardápio...</p>
    </div>
  </main>

  <footer class="cardapio-footer">
    <span>Preços sujeitos a alteração · Produtos indisponíveis não são exibidos</span>
    <span class="cardapio-footer-dots" id="cardapio-footer-dots" hidden></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/cardapio.js?v=2.0"></script>
</body>
</html>
