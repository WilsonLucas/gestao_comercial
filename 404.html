<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>
  <script>
    (function () {
      // Redireciona URLs antigas (ex: /gestao_comercial/inicio.html)
      // para a nova estrutura   (ex: /gestao_comercial/pages/inicio.html)
      var path = window.location.pathname;
      var base = '/gestao_comercial';
      var match = path.match(/\/([^/]+\.html)$/);
      if (match) {
        window.location.replace(base + '/pages/' + match[1]);
      } else {
        window.location.replace(base + '/');
      }
    }());
  </script>
</head>
<body></body>
</html>
