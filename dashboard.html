<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sistema de Gestao Comercial</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <section class="page-heading">
          <div>
            <span class="eyebrow">Visao geral</span>
            <h1>Dashboard</h1>
            <p>Acompanhe os principais indicadores do negocio em tempo real.</p>
          </div>
        </section>

        <section class="stats-grid" id="dashboard-stats"></section>

        <section class="panel-grid two-columns">
          <article class="panel">
            <div class="panel-header">
              <div>
                <h2>Desempenho mensal</h2>
                <p>Comparativo de gastos, vendas e lucro.</p>
              </div>
            </div>
            <div class="chart-wrapper large-chart">
              <canvas id="dashboardChart"></canvas>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <div>
                <h2>Ultimas vendas</h2>
                <p>Resumo das movimentacoes mais recentes.</p>
              </div>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Itens</th>
                    <th>Qtd.</th>
                    <th>Total</th>
                    <th>Lucro</th>
                  </tr>
                </thead>
                <tbody id="latest-sales-body"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
