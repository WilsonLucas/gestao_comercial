<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Painel Pedidos | Pastelaria Bom Sabor</title>

  <!-- Tipografia Inter (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">

  <link rel="stylesheet" href="assets/css/painel.css?v=1.4">
</head>
<!--
  Painel Pedidos — v1.3
  Página PÚBLICA, read-only, sem autenticação (data-page="painel").
  Carrega apenas supabase-client.js + painel.js — NÃO carrega auth.js,
  app.js nem config.js. Polling 5s em painel_cliente_view.
  Layout: 2 colunas (EM PREPARO unifica pendente+em_preparo | PRONTO).
-->
<body data-page="painel" class="painel-tv">

  <header class="painel-header">
    <div class="painel-header-left">
      <div class="painel-logo" aria-label="Logo">
        <span class="painel-logo-texto">Pastelaria Bom Sabor</span>
      </div>
    </div>
    <div class="painel-header-right">
      <div class="painel-conn" id="painel-conn" data-status="ok" title="Status da conexão">
        <span class="painel-conn-dot"></span>
        <span class="painel-conn-label">Online</span>
      </div>
      <div class="painel-clock" id="painel-clock" aria-label="Hora atual">--:--</div>
    </div>
  </header>

  <main class="painel-grid" id="painel-grid">
    <section class="painel-col col-em-preparo" data-coluna="em_preparo">
      <header class="painel-col-head">
        <h2>EM PREPARO</h2>
        <span class="painel-col-count" id="count-em-preparo" aria-live="polite">0</span>
      </header>
      <div class="painel-cards" id="col-em-preparo"></div>
      <div class="painel-col-pag" id="pag-em-preparo" hidden></div>
    </section>

    <section class="painel-col col-pronto" data-coluna="pronto">
      <header class="painel-col-head">
        <h2>PRONTO</h2>
        <span class="painel-col-count" id="count-pronto" aria-live="polite">0</span>
      </header>
      <div class="painel-cards" id="col-pronto"></div>
    </section>
  </main>

  <footer class="painel-footer">
    <span>Aguarde ser chamado</span>
  </footer>

  <!-- Aviso apenas para quem abrir em tela pequena durante dev -->
  <div class="painel-dev-warning">
    <p><strong>Painel Pedidos.</strong> Esta página foi desenhada para TVs 1080p em modo paisagem. Abra em kiosk fullscreen.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/painel.js?v=1.4"></script>
</body>
</html>
