<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque | Sistema de Gestão Comercial</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="estoque">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <section class="page-heading">
          <div>
            <span class="eyebrow">Inventário</span>
            <h1>Controle de estoque</h1>
            <p>Monitore níveis críticos, pesquise produtos e filtre por categoria.</p>
          </div>
        </section>

        <section class="panel">
          <div class="toolbar">
            <label><span>Buscar produto</span><input type="search" id="estoque-busca" placeholder="Digite o nome do produto"></label>
            <label><span>Categoria</span><select id="estoque-categoria"></select></label>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Produto</th>
                  <th>Categoria</th>
                  <th>Quantidade atual</th>
                  <th>Estoque mínimo</th>
                  <th>Status</th>
                  <th>Última compra</th>
                </tr>
              </thead>
              <tbody id="estoque-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/estoque.js"></script>
</body>
</html>
