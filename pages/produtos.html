<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos | Sistema de Gestao Comercial</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body data-page="produtos">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <section class="page-heading">
          <div>
            <span class="eyebrow">Cardapio</span>
            <h1>Produtos</h1>
            <p>Cadastre produtos com ficha tecnica de ingredientes e preco de venda.</p>
          </div>
          <button class="btn btn-primary" id="btn-novo-produto">+ Novo produto</button>
        </section>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Produtos cadastrados</h2>
              <p>Edite ou inative produtos quando necessario.</p>
            </div>
          </div>

          <!-- Barra de filtros -->
          <div class="filter-bar">
            <input type="text" id="filtro-nome" class="filter-input" placeholder="Buscar por nome...">
            <input type="text" id="filtro-ingrediente" class="filter-input" placeholder="Buscar por ingrediente...">

            <div class="multi-select-wrap" id="wrap-categoria">
              <button type="button" class="filter-btn" id="btn-categoria">Categoria <span class="filter-count" id="count-categoria"></span></button>
              <div class="multi-select-opts" id="filtro-categoria-opts">
                <label><input type="checkbox" value="Pastéis Salgados"> Pastéis Salgados</label>
                <label><input type="checkbox" value="Pastéis Doces"> Pastéis Doces</label>
                <label><input type="checkbox" value="Porções"> Porções</label>
                <label><input type="checkbox" value="Misto Quente"> Misto Quente</label>
                <label><input type="checkbox" value="Bebidas"> Bebidas</label>
              </div>
            </div>

            <div class="multi-select-wrap" id="wrap-status">
              <button type="button" class="filter-btn" id="btn-status">Status <span class="filter-count" id="count-status"></span></button>
              <div class="multi-select-opts" id="filtro-status-opts">
                <label><input type="checkbox" value="ativo"> Ativo</label>
                <label><input type="checkbox" value="inativo"> Inativo</label>
              </div>
            </div>

            <button type="button" class="btn btn-secondary" id="limpar-filtros">Limpar</button>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Categoria</th>
                  <th>Preco venda</th>
                  <th>Status</th>
                  <th>Acoes</th>
                </tr>
              </thead>
              <tbody id="produtos-body"></tbody>
            </table>
          </div>
        </article>
      </main>
    </div>
  </div>

  <!-- Modal de cadastro/edicao -->
  <div id="produto-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-titulo">Novo produto</h2>
        <button class="modal-close" id="fechar-modal">&times;</button>
      </div>
      <form id="produto-form" class="form-grid">
        <input type="hidden" id="produto-id">
        <label class="full-width"><span>Nome do produto</span><input type="text" id="produto-nome" required></label>
        <label><span>Categoria</span>
          <select id="produto-categoria" required>
            <option value="">Selecione...</option>
            <option value="Pastéis Salgados">Pastéis Salgados</option>
            <option value="Pastéis Doces">Pastéis Doces</option>
            <option value="Porções">Porções</option>
            <option value="Misto Quente">Misto Quente</option>
            <option value="Bebidas">Bebidas</option>
          </select>
        </label>
        <label><span>Preco de venda</span><input type="number" id="produto-preco" step="0.01" min="0" required></label>
        <div class="full-width">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <strong>Ficha tecnica</strong>
            <button type="button" class="btn btn-secondary" id="adicionar-ingrediente">+ Ingrediente</button>
          </div>
          <div id="ficha-tecnica-lista"></div>
        </div>
        <div class="form-actions full-width">
          <button class="btn btn-primary" type="submit">Salvar produto</button>
          <button class="btn btn-secondary" type="button" id="cancelar-edicao-produto">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/produtos.js"></script>
</body>
</html>
